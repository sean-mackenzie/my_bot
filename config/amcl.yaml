amcl:
  ros__parameters:
    use_sim_time: true

    # Frames / topics
    scan_topic: /scan
    odom_frame_id: odom
    base_frame_id: base_link
    global_frame_id: map

    # AMCL motion / sensor model
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    laser_model_type: "likelihood_field"

    # Particle filter sizing
    min_particles: 500
    max_particles: 2000
    pf_err: 0.05
    pf_z: 0.99
    resample_interval: 1

    # Sensor update behavior
    update_min_d: 0.10
    update_min_a: 0.10
    transform_tolerance: 1.0

    # Likelihood-field laser model
    z_hit: 0.5
    z_short: 0.05
    z_max: 0.05
    z_rand: 0.5
    sigma_hit: 0.2
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    max_beams: 60

    # Odometry noise parameters
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2

    # Beam skipping can help with occasional bad scans
    do_beamskip: false
    beam_skip_distance: 0.5
    beam_skip_threshold: 0.3
    beam_skip_error_threshold: 0.9

    # Save pose between runs
    save_pose_rate: 0.5